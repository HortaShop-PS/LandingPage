<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animated Landing Page</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <div id="layer1" class="layer">
            <img class="image" src="images/salad pattern-1st.png" alt="Salad Pattern 1">
        </div>
        
        <h1 id="main-title">HortaShop</h1>
        
        <div id="lottie-container"></div>
        
        <a href="https://github.com/HortaShop-PS/FrontEnd/releases/latest/download/HortaShop.apk" id="download-button" download="HortaShop.apk">Clique aqui para baixar o HortaShop</a>
        
        <div id="layer2" class="layer">
            <img class="image" src="images/salad pattern-2st.png" alt="Salad Pattern 2">
        </div>
        
        <div id="layer3" class="layer">
            <img class="image" src="images/salad pattern-3st.png" alt="Salad Pattern 3">
        </div>
    </div>

    <!-- Load Lottie library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lottie-web/5.9.6/lottie.min.js"></script>
    
    <!-- Load custom script -->
    <script src="script.js"></script>
</body>
</html>
